<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>My Dashboard | TUM Market</title>
    <link rel="stylesheet" href="profile.css?v=3">
</head>
<body>

<div class="profile-page">
    <div class="profile-topbar">
        <a href="/" class="back-btn">← Back to Marketplace</a>
        <button id="logoutBtn" class="logout-btn" type="button">Logout</button>
    </div>

    <div class="profile-header">
        <div class="profile-left">
            <div class="profile-image-container">
                <img src="https://cdn-icons-png.flaticon.com/512/149/149071.png" id="profilePageImage" class="profile-image" alt="User Profile Pic">
                <label class="upload-btn" for="changeProfilePic" title="Change profile photo">📷</label>
                <input type="file" id="changeProfilePic" accept="image/*" hidden>
            </div>
            <div class="profile-info">
                <h1 id="profileName">Student Account</h1>
                <p class="profile-role">Verified TUM Member</p>
                <p id="profileEmail" class="profile-email"></p>
            </div>
        </div>
    </div>

    <section class="listings-section">
        <h2 class="section-title">My Posted Advertisements</h2>
        <div class="user-listings" id="userListingsContainer"></div>
    </section>
</div>

<script>
document.addEventListener("DOMContentLoaded", () => {
    // Check dynamic backend session parameters first
    fetch('/api/user/session')
        .then(res => res.json())
        .then(user => {
            if (!user.logged_in) {
                alert("Session expired. Please login again.");
                window.location.href = "/";
                return;
            }
            document.getElementById("profileName").textContent = user.name;
            document.getElementById("profileEmail").textContent = user.email;
            applyProfilePicture(user.id, user.profile_picture);
            loadUserProducts();
        })
        .catch(() => {
            // Localstorage fallback framework
            const name = localStorage.getItem("tum_market_user");
            const email = localStorage.getItem("tum_market_user_email");
            if(!name){
                window.location.href = "/";
                return;
            }
            document.getElementById("profileName").textContent = name;
            document.getElementById("profileEmail").textContent = email || "";
            const userId = localStorage.getItem("tum_market_user_id");
            applyProfilePicture(userId, localStorage.getItem(`profile_picture_${userId}`));
            loadUserProducts();
        });

    document.getElementById("changeProfilePic").addEventListener("change", function() {
        const file = this.files[0];
        if (!file) return;
        if (!file.type.startsWith('image/')) {
            alert('Please choose an image file.');
            return;
        }
        if (file.size > 2 * 1024 * 1024) {
            alert('Image is too large. Please use a photo under 2MB.');
            return;
        }
        const reader = new FileReader();
        reader.onload = function(e) {
            const imageData = e.target.result;
            fetch('/api/user/profile-picture', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ image: imageData })
            })
            .then(res => res.json())
            .then(data => {
                if (data.success) {
                    const userId = localStorage.getItem("tum_market_user_id");
                    localStorage.setItem(`profile_picture_${userId}`, imageData);
                    document.getElementById("profilePageImage").src = imageData;
                    alert(data.message);
                } else {
                    alert(data.message || 'Could not save profile picture.');
                }
            })
            .catch(() => alert('Could not save profile picture. Check that you are logged in.'));
        };
        reader.readAsDataURL(file);
    });

    document.getElementById("logoutBtn").addEventListener("click", () => {
        fetch('/api/logout', { method: 'POST' }).finally(() => {
            localStorage.clear();
            window.location.href = "/";
        });
    });
});

function applyProfilePicture(userId, imageData) {
    if (!imageData) {
        const saved = localStorage.getItem(`profile_picture_${userId}`);
        if (saved) imageData = saved;
    }
    if (imageData) {
        document.getElementById("profilePageImage").src = imageData;
        if (userId) localStorage.setItem(`profile_picture_${userId}`, imageData);
    }
}

function loadUserProducts() {
    const container = document.getElementById("userListingsContainer");
    if (!container) return;
    container.innerHTML = '<p class="loading-state">Loading your products...</p>';

    fetch('/api/user/listings')
        .then(res => res.json())
        .then(data => {
            if (!data.success || !data.listings.length) {
                container.innerHTML = `<div class="empty-state"><h2>No Listings Yet</h2><p>Your items will appear here once listed.</p></div>`;
                return;
            }
            renderDashboardCards(data.listings, container);
        })
        .catch(() => {
            container.innerHTML = "<p style='color: #ef4444;'>Error loading live listings container.</p>";
        });
}

function renderDashboardCards(items, container) {
    container.innerHTML = "";
    items.forEach(item => {
        const isSold = item.status === 'sold';
        const card = document.createElement('article');
        card.className = `listing-card${isSold ? ' is-sold' : ''}`;
        card.innerHTML = `
            <div class="card-image">
                <img src="${item.image}" alt="${item.title}">
                ${isSold ? '<span class="sold-overlay">SOLD</span>' : ''}
            </div>
            <div class="card-info">
                <div class="price">Ksh ${item.price}</div>
                <h4>${item.title}</h4>
                <div class="location">📍 ${item.location}</div>
                <div class="card-buttons">
                    ${!isSold
                        ? `<button type="button" class="sold-btn" data-id="${item.id}">Mark As Sold</button>`
                        : '<span class="sold-label">Item Deactivated</span>'}
                </div>
            </div>
        `;
        const btn = card.querySelector('.sold-btn');
        if (btn) btn.addEventListener('click', () => markAsSold(item.id));
        container.appendChild(card);
    });
}

function markAsSold(id) {
    if (!confirm("Are you sure you want to mark this item as SOLD? It will be hidden from the home page marketplace row immediately.")) return;
    
    fetch(`/api/listings/${id}/sold`, { method: 'PATCH' })
        .then(res => res.json())
        .then(data => {
            alert(data.message);
            loadUserProducts();
        })
        .catch(() => alert("Could not update item state. Check endpoint routing."));
}
</script>
</body>
</html>
