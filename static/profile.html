<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>My Profile - TUM Market</title>
    <link rel="stylesheet" href="style.css">
    <!-- Cropper.js Library -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/cropperjs/1.5.13/cropper.min.css">
</head>
<body style="padding-top: 100px;">
    <nav class="navbar">
        <div class="logo">
            <a href="/" style="text-decoration: none;">
                <span class="brand">TUM MARKET</span>
            </a>
            <span class="tagline">Personal Dashboard</span>
        </div>
        <div class="nav-links">
            <a href="/" class="nav-link">Home</a>
            <button id="logoutBtn" class="nav-link" style="background:none; border:none; cursor:pointer; color: #f43f5e; font-weight: bold;">Logout</button>
        </div>
    </nav>

    <main style="max-width: 1100px; margin: 0 auto; padding: 20px;">
        <!-- Profile Summary -->
        <section class="profile-header" style="padding: 40px; border-radius: 24px; margin-bottom: 40px; display: flex; align-items: center; gap: 30px; flex-wrap: wrap;">
            <div id="profilePicContainer" style="flex-shrink: 0;">
                <!-- Avatar injected by JS -->
            </div>
            <div class="user-info" style="flex: 1; min-width: 250px;">
                <h1 id="userName" style="font-size: 2.2rem; color: white; margin-bottom: 8px;">User Name</h1>
                <p id="userEmail" style="color: var(--muted); font-size: 1.1rem; margin-bottom: 20px;">email@example.com</p>
                <div class="profile-actions" style="display: flex; flex-direction: column; gap: 12px;">
                    <div style="display: flex; gap: 12px;">
                        <input type="file" id="profilePicInput" accept="image/png, image/jpeg" style="display: none;">
                        <button onclick="document.getElementById('profilePicInput').click()" class="btn-view" style="width: auto; padding: 0 25px;">Change Photo</button>
                    </div>
                    <div id="uploadProgressContainer" style="display: none; width: 100%; max-width: 250px; background: rgba(255,255,255,0.1); border-radius: 10px; height: 8px; overflow: hidden;">
                        <div id="uploadProgressBar" style="width: 0%; height: 100%; background: var(--accent-2); transition: width 0.2s ease;"></div>
                    </div>
                </div>
            </div>
        </section>

        <!-- Listings Management -->
        <section>
            <div style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 25px;">
                <h2 style="font-size: 1.8rem; color: var(--accent-cta);">My Listed Items</h2>
            </div>
            
            <div id="userListingsGrid" class="listings-grid">
                <!-- Listings cards injected here -->
            </div>
        </section>
    </main>

    <!-- Edit Listing Modal -->
    <div class="modal" id="editModal">
        <div class="modal-content">
            <span class="close-btn" id="closeEditModalBtn">&times;</span>
            <h2>Edit Advertisement</h2>
            <form id="editAdForm">
                <input type="hidden" id="editAdId">
                <input type="text" id="editAdTitle" placeholder="Item title" required maxlength="200">
                <div id="editAdTitleCounter" class="char-counter">0 / 200</div>
                <input type="number" id="editAdPrice" placeholder="Price" required>
                <input type="text" id="editAdLocation" placeholder="Location" required>
                <select id="editAdCategory" required>
                    <option value="">Select Category</option>
                    <option value="electronics">Electronics</option>
                    <option value="hostels">Hostels</option>
                    <option value="fashion">Fashion</option>
                    <option value="bedrooms">Bedrooms &amp; Mattresses</option>
                    <option value="appliances">Home Appliances</option>
                    <option value="services">Services</option>
                </select>
                <input type="text" id="editAdPhone" placeholder="M-Pesa Phone Number">
                <input type="file" id="editAdImage" accept="image/*">
                <div id="editImagePreviewContainer" style="display:none;">
                    <img id="editImagePreview" src="" alt="Preview" style="width: 100%; border-radius: 10px; margin-top: 10px;">
                </div>
                <button type="submit">Update Advertisement</button>
            </form>
        </div>
    </div>

    <!-- Cropper Modal -->
    <div class="modal" id="cropperModal">
        <div class="modal-content" style="max-width: 500px;">
            <h2 style="margin-bottom: 15px;">Adjust Profile Picture</h2>
            <div class="cropper-container" style="width: 100%; height: 350px; background: #000; overflow: hidden; border-radius: 12px;">
                <img id="cropperImage" style="max-width: 100%;">
            </div>
            <div style="display: flex; gap: 10px; margin-top: 20px;">
                <button id="saveCropBtn" style="flex: 1;">Apply & Upload</button>
                <button id="cancelCropBtn" style="flex: 1; background: #64748b;">Cancel</button>
            </div>
        </div>
    </div>

    <script src="https://cdnjs.cloudflare.com/ajax/libs/cropperjs/1.5.13/cropper.min.js"></script>
    <script src="profile.js"></script>
</body>
</html>
